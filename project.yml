name: Noted
options:
  bundleIdPrefix: com.arjun
  deploymentTarget:
    macOS: "26.0"
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "6.2"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  NotedKit:
    path: NotedKit

targets:

  # ─────────────────────────────────────────────────────────────────────────
  # macOS app (AppKit + SwiftUI hybrid). iCloud Drive backed by NotedKit.
  # ─────────────────────────────────────────────────────────────────────────
  Noted:
    type: application
    platform: macOS
    sources:
      - path: Noted
        excludes:
          - Resources/Assets.xcassets
          - Resources/Info.plist
          - Resources/Noted.entitlements
    resources:
      - path: Noted/Resources/Assets.xcassets
    dependencies:
      - package: NotedKit
        product: NotedKit
    configFiles:
      Debug: Configs/Signing.xcconfig
      Release: Configs/Signing.xcconfig
    scheme: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arjun.Noted
        PRODUCT_NAME: Noted
        INFOPLIST_FILE: Noted/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Noted/Resources/Noted.entitlements
        GENERATE_INFOPLIST_FILE: NO
        # Signing settings (CODE_SIGN_IDENTITY, CODE_SIGN_STYLE, DEVELOPMENT_TEAM)
        # are intentionally NOT defined here — they live in Configs/Signing.xcconfig
        # so that personal overrides in Configs/Signing.local.xcconfig (gitignored)
        # are not clobbered by `xcodegen generate`.
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ─────────────────────────────────────────────────────────────────────────
  # iOS / iPadOS app (SwiftUI). Shares all data/services with macOS via
  # NotedKit and the same iCloud ubiquity container.
  # ─────────────────────────────────────────────────────────────────────────
  NotedIOS:
    type: application
    platform: iOS
    sources:
      - path: NotedIOS
        excludes:
          - Resources/Info.plist
          - Resources/NotedIOS.entitlements
    dependencies:
      - package: NotedKit
        product: NotedKit
    configFiles:
      Debug: Configs/Signing.xcconfig
      Release: Configs/Signing.xcconfig
    scheme: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arjun.Noted.ios
        PRODUCT_NAME: Noted
        INFOPLIST_FILE: NotedIOS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotedIOS/Resources/NotedIOS.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
