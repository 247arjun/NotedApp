name: Noted
options:
  bundleIdPrefix: com.noted
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  SWIFT_VERSION: "5.10"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Noted:
    type: application
    platform: macOS
    sources:
      - path: Noted
        excludes:
          - Resources/Assets.xcassets
          - Resources/Info.plist
          - Resources/Noted.entitlements
    resources:
      - path: Noted/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noted.app
        PRODUCT_NAME: Noted
        INFOPLIST_FILE: Noted/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Noted/Resources/Noted.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
